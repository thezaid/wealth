// Custom Mobile-Friendly Popover for Info Buttons
const PopoverInfo = ({ content, position = 'top', iconSize = 14, iconClass = "text-gray-400" }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [coords, setCoords] = useState({ top: 0, left: 0 });
  const buttonRef = useRef(null);
  const popoverRef = useRef(null);

  useEffect(() => {
    if (isOpen && buttonRef.current) {
      const rect = buttonRef.current.getBoundingClientRect();
      
      // Clamp left position to prevent bleeding off screen edges on mobile
      let left = rect.left + rect.width / 2;
      const popoverWidth = 256; // Approx w-64 (16rem = 256px)
      const halfWidth = popoverWidth / 2;
      const edgePadding = 16;
      
      if (left - halfWidth < edgePadding) {
        left = halfWidth + edgePadding;
      } else if (left + halfWidth > window.innerWidth - edgePadding) {
        left = window.innerWidth - halfWidth - edgePadding;
      }

      if (position === 'bottom') {
        setCoords({ top: rect.bottom + 8, left: left });
      } else {
        setCoords({ top: rect.top - 8, left: left });
      }

      const handleScroll = (e) => {
        // Allow scrolling inside the popover itself without closing
        if (popoverRef.current && popoverRef.current.contains(e.target)) return;
        setIsOpen(false);
      };

      const handleClickOutside = (event) => {
        if (popoverRef.current && !popoverRef.current.contains(event.target) &&
            buttonRef.current && !buttonRef.current.contains(event.target)) {
          setIsOpen(false);
        }
      };

      // Use capture phase for scroll to catch any inner element scrolling
      window.addEventListener('scroll', handleScroll, true);
      window.addEventListener('resize', handleScroll);
      document.addEventListener('mousedown', handleClickOutside);
      document.addEventListener('touchstart', handleClickOutside);

      return () => {
        window.removeEventListener('scroll', handleScroll, true);
        window.removeEventListener('resize', handleScroll);
        document.removeEventListener('mousedown', handleClickOutside);
        document.removeEventListener('touchstart', handleClickOutside);
      };
    }
  }, [isOpen, position]);

  return (
    <>
      <button
        ref={buttonRef}
        type="button"
        onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsOpen(!isOpen); }}
        className={`${iconClass} hover:text-blue-500 focus:outline-none transition-colors p-1 -m-1 rounded-full relative`}
        aria-label="More info"
      >
        <Info size={iconSize} />
      </button>
      {isOpen && createPortal(
        <div 
          ref={popoverRef}
          className="fixed w-64 p-3.5 bg-gray-900/95 backdrop-blur-md text-white text-xs rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] z-[99999] font-normal normal-case tracking-normal text-left whitespace-normal leading-relaxed animate-in fade-in zoom-in-95 duration-200"
          style={{ 
            top: `${coords.top}px`, 
            left: `${coords.left}px`,
            transform: `translate(-50%, ${position === 'top' ? '-100%' : '0'})`,
            maxWidth: '90vw'
          }}
        >
          <div className="flex justify-between items-start gap-3">
            <span className="flex-1">{content}</span>
            <button 
              onClick={(e) => { e.stopPropagation(); setIsOpen(false); }} 
              className="text-gray-400 hover:text-white p-1 -m-1 flex-shrink-0 bg-gray-800 rounded-full transition-colors"
            >
              <X size={12} />
            </button>
          </div>
        </div>,
        document.body
      )}
    </>
  );
};

const YearPicker = ({ value, onChange, icon: Icon, className = '' }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [view, setView] = useState('decades'); // 'decades' | 'years'
  const [activeDecade, setActiveDecade] = useState(2020);

  const decades = [1970, 1980, 1990, 2000, 2010, 2020, 2030, 2040];

  // Handle outside click
  useEffect(() => {
    const handleOutsideClick = (e) => {
      if (isOpen && !e.target.closest('.year-picker-container')) {
        setIsOpen(false);
      }
    };
    document.addEventListener('mousedown', handleOutsideClick);
    return () => document.removeEventListener('mousedown', handleOutsideClick);
  }, [isOpen]);

  const handleOpen = () => {
    if (!isOpen) {
      const safeValue = value || new Date().getFullYear();
      const decade = Math.floor(safeValue / 10) * 10;
      setActiveDecade(Math.max(1970, Math.min(2040, decade)));
      setView('decades'); // First show decades
    }
    setIsOpen(!isOpen);
  };

  const selectDecade = (decade) => {
    setActiveDecade(decade);
    setView('years'); // Then show actual years
  };

  const selectYear = (year) => {
    onChange(year);
    setIsOpen(false);
  };

  const yearsInDecade = Array.from({ length: 10 })
    .map((_, i) => activeDecade + i)
    .filter(y => y >= 1970 && y <= 2040); // Cap at 2040

  return (
    <div className={`relative year-picker-container w-full ${className}`}>
      {Icon && <Icon className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 z-10" size={18} />}
      <button
        type="button"
        onClick={handleOpen}
        className={`w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 flex items-center justify-between p-3 transition-all outline-none shadow-sm
          ${Icon ? 'pl-9' : 'pl-4'} pr-4`}

        <ChevronDown size={16} className={`text-gray-400 transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`} />
      </button>

      {isOpen && (
        <div className="absolute z-[100] mt-2 w-64 bg-white/95 backdrop-blur-xl border border-gray-200 rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] p-4 left-0 origin-top-left">
          {view === 'decades' ? (
            <div className="animate-in fade-in zoom-in-95 duration-200">
              <div className="text-center font-bold text-gray-800 mb-4 text-sm tracking-wide uppercase">Select Decade</div>
              <div className="grid grid-cols-2 gap-2.5">
                {decades.map(d => (
                  <button
                    key={d}
                    onClick={() => selectDecade(d)}
                    className={`py-2.5 px-2 rounded-xl text-sm font-semibold transition-all duration-200
                      ${Math.floor((value || 0)/10)*10 === d ? 'bg-blue-500 text-white shadow-md shadow-blue-500/20' : 'bg-gray-50 text-gray-700 hover:bg-gray-100 hover:scale-[1.02]'}`}
                  >
                    {d}-{d+9}
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="animate-in slide-in-from-right-4 fade-in duration-200">
              <div className="flex items-center justify-between mb-4">
                <button onClick={() => setView('decades')} className="p-1.5 hover:bg-gray-100 rounded-lg text-gray-500 transition-colors">
                  <ChevronLeft size={18} />
                </button>
                <span className="font-bold text-gray-800 text-sm cursor-pointer hover:text-blue-600 transition-colors" onClick={() => setView('decades')}>
                  {activeDecade}s

              </div>
            </div>
          )}
        </div>
      )}

  );
};

const NumberInput = ({ value, onChange, icon: Icon, prefix, suffix, className = '', ...props }) => {
  const [displayValue, setDisplayValue] = useState(value ? value.toLocaleString('en-US') : '');

  useEffect(() => {
    if (value !== undefined && value !== null) {
      const parsedDisplay = parseFloat(displayValue.replace(/,/g, ''));
      if (parsedDisplay !== value) {
        setDisplayValue(value.toLocaleString('en-US'));
      }
    }
  }, [value]);

  const handleBlur = () => {
    if (value !== undefined && value !== null) {
      setDisplayValue(value.toLocaleString('en-US'));
    }
  };

  const handleChange = (e) => {
    const rawValue = e.target.value.replace(/,/g, '');
    if (rawValue === '') {
      setDisplayValue('');
      onChange(0);
      return;
    }
    if (/^-?\d*\.?\d*$/.test(rawValue)) {
      setDisplayValue(e.target.value);
      const num = parseFloat(rawValue);
      if (!isNaN(num)) onChange(num);
    }
  };

  // Dynamically increase padding if the text inside the prefix/suffix is long (like "Year" or "years")
  const paddingLeft = Icon ? 'pl-10' : prefix ? (String(prefix).length > 2 ? 'pl-16' : 'pl-9') : 'pl-4';
  const paddingRight = suffix ? (String(suffix).length > 2 ? 'pr-20' : 'pr-10') : 'pr-4';

  return (
    <div className={`relative flex items-center ${className}`}>
      {Icon && <Icon className="absolute left-3.5 text-gray-400" size={18} />}
      {prefix && <span className="absolute left-3.5 text-gray-500 font-medium z-10">{prefix}</span>}
      <input
        type="text"
        value={displayValue}
        onChange={handleChange}
        onBlur={handleBlur}
        className={`w-full bg-gray-50 border border-gray-200 text-gray-900 text-base rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3 transition-all outline-none shadow-sm
          ${paddingLeft}
          ${paddingRight}
        `}
        {...props}
      />
      {suffix && <span className="absolute right-4 text-gray-500 font-medium">{suffix}</span>}
    </div>
  );
};

function FinanceCalculator() {
  // --- State: Core Parameters ---
  const [startYear, setStartYear] = useState(2026);
  const [initialCapital, setInitialCapital] = useState(50000);
  const [totalYears, setTotalYears] = useState(30);
  const [baseReturnRate, setBaseReturnRate] = useState(8);
  const [compoundingFrequency, setCompoundingFrequency] = useState('yearly'); // 'yearly' | 'monthly'
  const [expandedYear, setExpandedYear] = useState(null);
  const [isCardsScrolled, setIsCardsScrolled] = useState(false);
  
  const chartRef = useRef(null);

  // Print States
  const [showPrintModal, setShowPrintModal] = useState(false);
  const [printDetails, setPrintDetails] = useState({ author: '', date: new Date().toISOString().split('T')[0], comments: '' });

  // Info Modal State
  const [showInfoModal, setShowInfoModal] = useState(false);

  const handlePrintSubmit = () => {
    setShowPrintModal(false);
    setExpandedYear('ALL');
    // Allow React time to render expanded tables before triggering print dialog
    setTimeout(() => {
      window.print();
      setExpandedYear(null);
    }, 500);
  };

  // Auto-collapse monthly breakdowns if user switches back to yearly
  useEffect(() => {
    if (compoundingFrequency === 'yearly' && expandedYear !== 'ALL') {
      setExpandedYear(null);
    }
  }, [compoundingFrequency, expandedYear]);

  // Contributions
  const [annualContribution, setAnnualContribution] = useState(12000);
  const [contributionYears, setContributionYears] = useState(20);
  const [contributionGrowth, setContributionGrowth] = useState(0);
  const [contributionGrowthType, setContributionGrowthType] = useState('percent'); // 'percent' | 'amount'

  // --- State: Advanced Toggles ---
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [enableInflation, setEnableInflation] = useState(false);
  const [enableZakat, setEnableZakat] = useState(false);
  const [enableWithdrawal, setEnableWithdrawal] = useState(false);
  const [enableMultiAsset, setEnableMultiAsset] = useState(false);
  const [enableEvents, setEnableEvents] = useState(false);

  // --- State: Advanced Settings ---
  const [inflationRate, setInflationRate] = useState(3);
  const [zakatRate, setZakatRate] = useState(2.5);
  
  const [withdrawalType, setWithdrawalType] = useState('percent'); 
  const [withdrawalValue, setWithdrawalValue] = useState(4); 
  const [withdrawalTimingType, setWithdrawalTimingType] = useState('index');
  const [withdrawalStartYearIndex, setWithdrawalStartYearIndex] = useState(21);
  const [withdrawalStartCalYear, setWithdrawalStartCalYear] = useState(2046);
  
  const [portfolio, setPortfolio] = useState([
    { id: 1, name: 'US Stocks', allocation: 70, returnRate: 10 },
    { id: 2, name: 'Bonds', allocation: 30, returnRate: 4 },
  ]);

  const [events, setEvents] = useState([
    { id: 1, timingType: 'index', yearIndex: 5, calendarYear: 2030, type: 'inject', amount: 50000, description: 'Inheritance' },
    { id: 2, timingType: 'index', yearIndex: 10, calendarYear: 2035, type: 'remove', amount: 30000, description: 'Car Purchase' },
  ]);

  // --- Derived Calculations ---
  const totalAllocation = portfolio.reduce((acc, curr) => acc + curr.allocation, 0);
  const blendedReturnRate = enableMultiAsset 
    ? portfolio.reduce((acc, curr) => acc + (curr.allocation / 100) * curr.returnRate, 0)
    : baseReturnRate;

  // --- Core Calculation Engine ---
  const projectionData = useMemo(() => {
    const data = [];
    let currentBalance = initialCapital;
    let totalInvested = initialCapital;
    let totalReturns = 0;
    let totalZakatPaid = 0;
    let totalWithdrawn = 0;

    let currentContributionAmount = annualContribution;

    // Calculate effective interest rate based on compounding frequency
    let effectiveRate = blendedReturnRate / 100;
    if (compoundingFrequency === 'monthly') {
      effectiveRate = Math.pow(1 + effectiveRate / 12, 12) - 1;
    }

    for (let year = 1; year <= totalYears; year++) {
      const calendarYear = startYear + year - 1;
      let startingBalance = currentBalance;
      let contribution = 0;
      let withdrawal = 0;
      let eventInjection = 0;
      let eventRemoval = 0;
      let eventLabels = [];

      // 1. Regular Contributions
      if (year <= contributionYears) {
        contribution = currentContributionAmount;
        if (contributionGrowthType === 'percent') {
          currentContributionAmount *= (1 + (contributionGrowth / 100));
        } else {
          currentContributionAmount += contributionGrowth;
        }
      }

      // 2. Specific Events
      if (enableEvents) {
        events.forEach(e => {
          let eventIndexYear = e.yearIndex;
          if (e.timingType === 'year' && e.calendarYear) {
            eventIndexYear = e.calendarYear - startYear + 1;
          }
          
          if (eventIndexYear === year) {
            if (e.type === 'inject') {
              eventInjection += e.amount;
              if(e.description) eventLabels.push(`+ ${e.description}`);
            }
            if (e.type === 'remove') {
              eventRemoval += e.amount;
              if(e.description) eventLabels.push(`- ${e.description}`);
            }
          }
        });
      }

      // 3. Regular Withdrawals
      let effectiveWithdrawalStartYear = withdrawalStartYearIndex;
      if (withdrawalTimingType === 'year' && withdrawalStartCalYear) {
        effectiveWithdrawalStartYear = withdrawalStartCalYear - startYear + 1;
      }

      if (enableWithdrawal && year >= effectiveWithdrawalStartYear) {
        if (withdrawalType === 'percent') {
          withdrawal = (startingBalance + contribution + eventInjection - eventRemoval) * (withdrawalValue / 100);
        } else {
          withdrawal = withdrawalValue;
        }
      }

      let monthlyData = [];
      let growth = 0;
      let zakatAmount = 0;
      let endBalance = 0;

      if (compoundingFrequency === 'monthly') {
        let currentMonthBalance = startingBalance;
        const monthlyRate = (blendedReturnRate / 100) / 12;
        const mContrib = contribution / 12;
        const mWithdraw = withdrawal / 12;

        for (let m = 1; m <= 12; m++) {
          // Apply events in Month 1 for simplicity
          let mEventNet = (m === 1) ? (eventInjection - eventRemoval) : 0;

          let mWorkingBalance = currentMonthBalance + mContrib + mEventNet - mWithdraw;
          if (mWorkingBalance < 0) mWorkingBalance = 0;

          let mGrowth = mWorkingBalance * monthlyRate;
          growth += mGrowth;

          // Zakat only applies at the very end of the year (Month 12)
          let mZakat = 0;
          let mBalanceBeforeZakat = mWorkingBalance + mGrowth;
          if (m === 12 && enableZakat && mBalanceBeforeZakat > 0) {
            mZakat = mBalanceBeforeZakat * (zakatRate / 100);
            zakatAmount = mZakat;
          }

          let mEndBalance = mBalanceBeforeZakat - mZakat;

          monthlyData.push({
            month: m,
            startBalance: currentMonthBalance,
            invest: mContrib,
            events: mEventNet,
            withdrawal: mWithdraw,
            growth: mGrowth,
            zakat: mZakat,
            endBalance: mEndBalance
          });
          currentMonthBalance = mEndBalance;
        }
        endBalance = currentMonthBalance;
        totalReturns += growth;
        totalZakatPaid += zakatAmount;
      } else {
        // 4. Update working balance before growth
        let workingBalance = startingBalance + contribution + eventInjection - eventRemoval - withdrawal;
        if (workingBalance < 0) workingBalance = 0;

        // 5. Calculate Growth using the exact frequency effective rate
        growth = workingBalance * effectiveRate;
        totalReturns += growth;
        
        let balanceBeforeZakat = workingBalance + growth;

        // 6. Zakat Deduction
        if (enableZakat && balanceBeforeZakat > 0) {
          zakatAmount = balanceBeforeZakat * (zakatRate / 100);
          totalZakatPaid += zakatAmount;
        }

        // 7. Final End of Year Balance
        endBalance = balanceBeforeZakat - zakatAmount;
      }

      totalInvested += contribution + eventInjection;
      totalWithdrawn += withdrawal + eventRemoval;
      currentBalance = endBalance;

      // 8. Inflation Adjustment
      let realBalance = currentBalance;
      if (enableInflation) {
        realBalance = currentBalance / Math.pow(1 + (inflationRate / 100), year);
      }

      data.push({
        year,
        calendarYear,
        startingBalance,
        contribution,
        withdrawal,
        netEvents: eventInjection - eventRemoval,
        eventLabels,
        growth,
        zakatAmount,
        endBalance: currentBalance,
        realBalance,
        monthlyData,
        totalInvested,
        totalReturns,
        totalZakatPaid,
        totalWithdrawn
      });
    }
    return data;
  }, [

        </div>

        {/* Right Column: Visualizations & Data */}
        <div className="flex-1 w-full space-y-6 print:w-full print:block print-break-after">
          
          {/* Interactive Chart */}
          <Card className="h-[480px] flex flex-col border-gray-200/60 z-10 relative print:h-[500px] print:shadow-none print:border-none print:p-0 fullscreen-card" ref={chartRef}>
            <div className="flex justify-between items-center mb-6">
              <h2 className="text-xl font-bold text-gray-800">Wealth Trajectory</h2>
              <div className="flex items-center gap-3">
                <div className="text-sm font-medium text-gray-500 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100">
                  {startYear} - {startYear + totalYears - 1}
                </div>
                <button 
                  onClick={toggleFullScreen}
                  className="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors print:hidden"
                  title="View Fullscreen Chart"
                >
                  <Maximize size={18} />
                </button>
              </div>
            </div>
            <div className="flex-1 w-full min-h-0">
              <ResponsiveContainer width="100%" height="100%">
                <ComposedChart data={projectionData} margin={{ top: 10, right: 10, left: 10, bottom: 0 }}>
                  <defs>
                    <linearGradient id="colorInvested" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.4}/>
                      <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                    </linearGradient>
                    <linearGradient id="colorReturns" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#10b981" stopOpacity={0.4}/>
                      <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="4 4" vertical={false} stroke="#f3f4f6" />
                  <XAxis 
                    dataKey="calendarYear" 
                    tickLine={false} 
                    axisLine={false} 
                    tick={{ fill: '#9ca3af', fontSize: 13, fontWeight: 500 }}
                    minTickGap={30}
                  />
                  <YAxis 
                    tickFormatter={(value) => `₹${value >= 1000 ? (value / 1000).toLocaleString('en-IN') + 'k' : value}`}
                    tickLine={false} 
                    axisLine={false} 
                    tick={{ fill: '#9ca3af', fontSize: 13, fontWeight: 500 }}
                    width={70}
                  />
                  <RechartsTooltip 
                    contentStyle={{ borderRadius: '16px', border: '1px solid #f3f4f6', boxShadow: '0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1)', padding: '16px', backgroundColor: 'rgba(255, 255, 255, 0.95)', backdropFilter: 'blur(8px)' }}
                    formatter={(value) => formatCurrency(value)}
                    labelFormatter={(label) => <span className="font-bold text-gray-900 text-base mb-2 block">{label} <span className="text-gray-400 font-normal text-sm ml-1">(Year {label - startYear + 1})</span></span>}
                    labelStyle={{ color: '#111827' }}
                  />
                  <Legend iconType="circle" wrapperStyle={{ fontSize: '13px', paddingTop: '20px', fontWeight: 500 }} />
                  
                  <Area isAnimationActive={expandedYear !== 'ALL'} type="monotone" dataKey="totalInvested" name="Total Principal" stackId="1" stroke="#3b82f6" fill="url(#colorInvested)" strokeWidth={3} />
                  <Area isAnimationActive={expandedYear !== 'ALL'} type="monotone" dataKey="totalReturns" name="Total Returns" stackId="1" stroke="#10b981" fill="url(#colorReturns)" strokeWidth={3} />
                  
                  <Line isAnimationActive={expandedYear !== 'ALL'} type="monotone" dataKey="endBalance" name="Nominal Balance" stroke="#111827" strokeWidth={3} dot={false} activeDot={{ r: 6, strokeWidth: 0 }} />
                  {enableInflation && (
                    <Line isAnimationActive={expandedYear !== 'ALL'} type="monotone" dataKey="realBalance" name="Real Balance" stroke="#8b5cf6" strokeWidth={2} strokeDasharray="6 6" dot={false} />
                  )}
                </ComposedChart>
              </ResponsiveContainer>
            </div>
          </Card>

          {/* Detailed Data Table */}
          <Card className="overflow-hidden p-0 !pb-0 border-gray-200/60 z-10 relative print:shadow-none print:border-none print:p-0 print-break-before">
            <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-white print:px-0 print:pt-0">
              <h2 className="text-xl font-bold text-gray-800">Annual Breakdown</h2>
            </div>
            <div className="overflow-x-auto max-h-[500px] overflow-y-auto print:max-h-none print:overflow-visible">
              <table className="w-full text-xs sm:text-sm text-left">
                <thead className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-wider bg-gray-100 sticky top-0 z-10 shadow-sm leading-tight print:bg-gray-100 border-b border-gray-200">
                  <tr>
                    <th className="px-2 sm:px-4 py-3 font-bold align-bottom">Year</th>
                    <th className="px-2 sm:px-4 py-3 font-bold text-blue-600 align-bottom">Invest</th>
                    {enableEvents && <th className="px-2 sm:px-4 py-3 font-bold text-purple-600 align-bottom">Events</th>}
                    {enableWithdrawal && <th className="px-2 sm:px-4 py-3 font-bold text-red-500 align-bottom">With-<br/>drawals</th>}
                    <th className="px-2 sm:px-4 py-3 font-bold text-emerald-600 align-bottom">Growth</th>
                    {enableZakat && <th className="px-2 sm:px-4 py-3 font-bold text-amber-600 align-bottom">Zakat</th>}
                    <th className="px-2 sm:px-4 py-3 font-bold text-gray-900 bg-gray-200/50 align-bottom">End<br/>Balance</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100 bg-white">
                  {projectionData.map((row) => {
                    const isExpanded = expandedYear === row.year || expandedYear === 'ALL';
                    return (
                    <React.Fragment key={row.year}>
                      <tr 
                        className={`hover:bg-blue-50/30 transition-colors group print:break-inside-avoid ${compoundingFrequency === 'monthly' ? 'cursor-pointer print:cursor-default' : ''}`}
                        onClick={() => compoundingFrequency === 'monthly' && expandedYear !== 'ALL' ? setExpandedYear(expandedYear === row.year ? null : row.year) : undefined}
                      >
                        <td className="px-2 sm:px-4 py-3 flex items-center gap-2 whitespace-nowrap">
                          {compoundingFrequency === 'monthly' && (
                            <div className="flex-shrink-0 print:hidden">
                              {isExpanded ? <ChevronDown size={16} className="text-blue-500" /> : <ChevronRight size={16} className="text-gray-400 group-hover:text-blue-500 transition-colors" />}
                            </div>
                          )}
                          <div>
                            <div className="font-bold text-gray-900">{row.calendarYear}</div>
                            <div className="text-[10px] sm:text-xs text-gray-400">Year {row.year}</div>
                          </div>
                        </td>
                        <td className="px-2 sm:px-4 py-3 font-semibold text-blue-600 whitespace-nowrap">{row.contribution > 0 ? `+${formatCurrency(row.contribution)}` : '-'}</td>
                        
                        {enableEvents && (
                          <td className="px-2 sm:px-4 py-3 whitespace-nowrap">
                            <span className={`font-semibold ${row.netEvents > 0 ? 'text-purple-600' : row.netEvents < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                              {row.netEvents !== 0 ? (row.netEvents > 0 ? '+' : '') + formatCurrency(row.netEvents) : '-'}
                            </span>
                            {row.eventLabels.length > 0 && (
                              <span className="block text-[10px] font-medium text-gray-500 mt-0.5 max-w-[100px] sm:max-w-[150px] truncate" title={row.eventLabels.join(', ')}>
                                {row.eventLabels.join(', ')}
                              </span>
                            )}
                          </td>
                        )}
                        
                        {enableWithdrawal && (
                          <td className="px-2 sm:px-4 py-3 font-semibold text-red-500 whitespace-nowrap">{row.withdrawal > 0 ? `-${formatCurrency(row.withdrawal)}` : '-'}</td>
                        )}
                        
                        <td className="px-2 sm:px-4 py-3 font-semibold text-emerald-600 whitespace-nowrap">+{formatCurrency(row.growth)}</td>
                        
                        {enableZakat && (
                          <td className="px-2 sm:px-4 py-3 font-semibold text-amber-600 whitespace-nowrap">{row.zakatAmount > 0 ? `-${formatCurrency(row.zakatAmount)}` : '-'}</td>
                        )}
                        
                        <td className="px-2 sm:px-4 py-3 font-extrabold text-gray-900 bg-gray-50/30 group-hover:bg-transparent transition-colors whitespace-nowrap">
                          {formatCurrency(row.endBalance)}
                        </td>
                      </tr>
                      
                      {isExpanded && compoundingFrequency === 'monthly' && (
                        <tr className="bg-gray-50/80 shadow-inner print:bg-white print:shadow-none print:break-inside-avoid">
                          <td colSpan={9} className="p-0 border-b border-gray-300">
                            <div className="py-4 px-3 sm:px-6 md:px-10 lg:px-14 print:px-6 print:py-6">
                              <h4 className="text-xs sm:text-sm font-bold text-gray-700 mb-3 flex items-center gap-2">
                                <CalendarDays size={16} className="text-blue-500 print:text-gray-600" />
                                Monthly Compounding Breakdown ({row.calendarYear})
                              </h4>
                              <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm print:border-gray-300 print:shadow-none">
                                <table className="w-full text-xs sm:text-sm text-left">
                                  <thead className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-wider bg-gray-100 leading-tight">
                                    <tr>
                                      <th className="px-2 sm:px-4 py-2 font-bold align-bottom whitespace-nowrap">Month</th>
                                      <th className="px-2 sm:px-4 py-2 font-bold text-blue-600 align-bottom">Invest</th>
                                      {enableEvents && <th className="px-2 sm:px-4 py-2 font-bold text-purple-600 align-bottom">Events</th>}
                                      {enableWithdrawal && <th className="px-2 sm:px-4 py-2 font-bold text-red-500 align-bottom">With-<br/>drawals</th>}
                                      <th className="px-2 sm:px-4 py-2 font-bold text-emerald-600 align-bottom">Growth</th>
                                      {enableZakat && <th className="px-2 sm:px-4 py-2 font-bold text-amber-600 align-bottom">Zakat</th>}
                                      <th className="px-2 sm:px-4 py-2 font-bold text-gray-900 bg-gray-50 align-bottom">End<br/>Balance</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-100 bg-gray-50/30">
                                    {row.monthlyData.map(m => (
                                      <tr key={m.month} className="hover:bg-blue-50/30 transition-colors">
                                        <td className="px-2 sm:px-4 py-2 font-bold text-gray-900 whitespace-nowrap">{MONTH_NAMES[m.month - 1]} {row.calendarYear}</td>
                                        <td className="px-2 sm:px-4 py-2 font-semibold text-blue-600 whitespace-nowrap">
                                          {m.invest > 0 ? `+${formatCurrency(m.invest)}` : <span className="text-blue-300 font-medium">-</span>}
                                        </td>
                                        {enableEvents && <td className="px-2 sm:px-4 py-2 whitespace-nowrap">
                                          {m.events !== 0 ? (
                                            <span className={`font-semibold ${m.events > 0 ? 'text-purple-600' : 'text-red-500'}`}>
                                              {m.events > 0 ? '+' : ''}{formatCurrency(m.events)}
                                            </span>
                                          ) : <span className="text-purple-300 font-medium">-</span>}
                                        </td>}
                                        {enableWithdrawal && <td className="px-2 sm:px-4 py-2 whitespace-nowrap">
                                          {m.withdrawal > 0 ? (
                                            <span className="font-semibold text-red-500">-{formatCurrency(m.withdrawal)}</span>
                                          ) : <span className="text-red-300 font-medium">-</span>}
                                        </td>}
                                        <td className="px-2 sm:px-4 py-2 font-semibold text-emerald-600 whitespace-nowrap">+{formatCurrency(m.growth)}</td>
                                        {enableZakat && <td className="px-2 sm:px-4 py-2 whitespace-nowrap">
                                          {m.zakat > 0 ? (
                                            <span className="font-semibold text-amber-600">-{formatCurrency(m.zakat)}</span>
                                          ) : <span className="text-amber-300 font-medium">-</span>}
                                        </td>}
                                        <td className="px-2 sm:px-4 py-2 font-bold text-gray-900 bg-white print:bg-transparent whitespace-nowrap">{formatCurrency(m.endBalance)}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  )})}
                </tbody>
              </table>
            </div>
          </Card>
          
        </div>
      </main>

      {/* Page Last - Print Only Assumptions */}
      <div className="hidden print:block print-break-before p-8 max-w-7xl mx-auto">
        <h2 className="text-2xl font-extrabold mb-8 text-gray-900 border-b-2 border-gray-800 pb-4">Report Assumptions</h2>
        
        <div className="grid grid-cols-2 gap-y-6 gap-x-12 text-sm text-gray-800">
          <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Initial Capital</strong> <span className="text-lg font-semibold">{formatCurrency(initialCapital)}</span></div>
          <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Projection Horizon</strong> <span className="text-lg font-semibold">{totalYears} years (Starting {startYear})</span></div>
          
          <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Base Addition</strong> <span className="text-lg font-semibold">{formatCurrency(annualContribution)} for {contributionYears} years</span></div>
          {contributionGrowth > 0 && <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Contribution Growth</strong> <span className="text-lg font-semibold">{contributionGrowth}{contributionGrowthType === 'percent' ? '%' : '₹'} annually</span></div>}
          
          <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Compounding Frequency</strong> <span className="text-lg font-semibold">{compoundingFrequency === 'monthly' ? 'Monthly' : 'Yearly'}</span></div>
          
          {enableMultiAsset ? (
             <div className="col-span-2"><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Portfolio Allocation</strong> <span className="text-lg font-semibold">{portfolio.map(p => `${p.name} (${p.allocation}%, ${p.returnRate}% return)`).join(', ')}</span></div>
          ) : (
             <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Expected Return</strong> <span className="text-lg font-semibold">{baseReturnRate}%</span></div>
          )}
          
          {enableInflation && <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Inflation Rate</strong> <span className="text-lg font-semibold">{inflationRate}% annually</span></div>}
          {enableZakat && <div><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Zakat Rate</strong> <span className="text-lg font-semibold">{zakatRate}% deducted annually</span></div>}
          
          {enableWithdrawal && <div className="col-span-2"><strong className="block text-gray-500 uppercase tracking-wider text-xs mb-1">Withdrawal Phase</strong> <span className="text-lg font-semibold">Commencing {withdrawalTimingType === 'index' ? `Year ${withdrawalStartYearIndex}` : withdrawalStartCalYear} at {withdrawalValue}{withdrawalType === 'percent' ? '%' : '₹'} annually</span></div>}
        </div>

        <div className="mt-16 p-6 bg-gray-50 rounded-2xl border border-gray-200 text-center text-gray-600 font-medium">
           Prepared by Zaid using A.I., for any bug please contact <a href="mailto:zaidshaikh@msn.com" className="text-blue-600 underline">zaidshaikh@msn.com</a>
        </div>
      </div>

      {/* Modal for How it Works / Glossary (Fullscreen) */}
      {showInfoModal && (
        <div className="fixed inset-0 bg-white z-[100] flex flex-col animate-in fade-in zoom-in-95 duration-200 print:hidden">
          {/* Header */}
          <div className="flex justify-between items-center px-6 py-4 border-b border-gray-100 sticky top-0 bg-white z-10 shadow-sm">
            <h3 className="text-xl font-bold flex items-center gap-2 text-gray-900">
              <Info size={24} className="text-blue-600" /> How It Works & Glossary
            </h3>
            <button onClick={() => setShowInfoModal(false)} className="p-2 text-gray-400 hover:text-gray-900 bg-gray-50 hover:bg-gray-100 rounded-full transition-colors flex items-center gap-2">
              <span className="text-sm font-semibold hidden sm:block pr-1">Close</span>
              <X size={20} />
            </button>
          </div>
          
          {/* Content */}
          <div className="flex-1 overflow-y-auto p-6 md:p-10 max-w-4xl mx-auto w-full">
             <GlossaryContent />
          </div>
        </div>
      )}

      {/* Modal for Export Settings */}
      {showPrintModal && (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl p-6 w-full max-w-md shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] animate-in zoom-in-95 duration-200">
            <h3 className="text-xl font-bold mb-5 flex items-center gap-2 text-gray-900">
              <FileText size={20} className="text-blue-600" /> Print / Export PDF Settings
            </h3>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">Prepared By (Author)</label>
                <div className="relative">
                  <User size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input 
                    type="text" 
                    placeholder="Your Name" 
                    className="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-10 pr-4 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    value={printDetails.author} 
                    onChange={e => setPrintDetails({...printDetails, author: e.target.value})} 
                  />
                </div>
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">Date</label>
                <div className="relative">
                  <CalendarDays size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                  <input 
                    type="date" 
                    className="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 pl-10 pr-4 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    value={printDetails.date} 
                    onChange={e => setPrintDetails({...printDetails, date: e.target.value})} 
                  />
                </div>
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1.5">Project Comments / Goals</label>
                <textarea 
                  placeholder="E.g. Retirement projection assuming aggressive growth..." 
                  rows={3}
                  className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all resize-none"
                  value={printDetails.comments} 
                  onChange={e => setPrintDetails({...printDetails, comments: e.target.value})} 
                />
              </div>
            </div>
            <div className="flex justify-end gap-3 mt-6 pt-5 border-t border-gray-100">
              <button 
                onClick={() => setShowPrintModal(false)} 
                className="px-5 py-2.5 rounded-xl font-bold text-gray-600 hover:bg-gray-100 transition-colors"
              >
                Cancel
              </button>
              <button 
                onClick={handlePrintSubmit} 
                className="px-5 py-2.5 rounded-xl font-bold bg-blue-600 text-white shadow-md hover:bg-blue-700 hover:shadow-lg transition-all flex items-center gap-2"
              >
                <Printer size={18} /> Generate PDF
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<FinanceCalculator />);
  </script>
</body>
</html>
